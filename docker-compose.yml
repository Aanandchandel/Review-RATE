version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: review-rate-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: reviewrate
    networks:
      - review-rate-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: review-rate-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/reviewrate
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - review-rate-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: review-rate-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - review-rate-net

volumes:
  mongo_data:
  uploads_data:

networks:
  review-rate-net:
    driver: bridge
